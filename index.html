<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberatory</title>
    <link rel="icon" href="assets/profile.webp" type="image/webp">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        /* ── Custom cursor ──────────────────────────────────────────────── */
        .custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background: url('assets/custom_cursor.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none; /* hidden until first mousemove */
        }

        body:not(.touch-device) { cursor: none; }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        .glitch-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #hacker-overlay, #snow-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .hidden { display: none !important; }

        /* ── Theme buttons ──────────────────────────────────────────────── */
        .controls {
            position: fixed;
            bottom: calc(50% - 240px - 10px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .theme-button {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background-color: rgba(0,0,0,0.5);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            font-size: 14px; font-weight: bold;
        }
        .theme-button:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.8); }

        /* ── Volume ─────────────────────────────────────────────────────── */
        .volume-control {
            display: flex; align-items: center; gap: 8px;
        }
        .volume-icon {
            width: 20px; height: 20px;
            cursor: pointer; display: flex; color: white;
        }

        /* ── Transparency ───────────────────────────────────────────────── */
        .transparency-control {
            display: flex; align-items: center; gap: 8px;
        }
        .transparency-icon {
            width: 20px; height: 20px; color: white;
        }

        /* ── Shared slider ──────────────────────────────────────────────── */
        .slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px; height: 5px;
            border-radius: 5px;
            background: rgba(255,255,255,0.3);
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        /* ── Trail style button ─────────────────────────────────────────── */
        .trail-button {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
            user-select: none;
            flex-shrink: 0;
        }
        .trail-button:hover {
            border-color: rgba(255,255,255,0.7);
            transform: scale(1.15);
        }

        /* ── Top controls bar ───────────────────────────────────────────── */
        .top-controls {
            position: fixed;
            bottom: calc(50% - 240px - 60px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* ── Profile block ──────────────────────────────────────────────── */
        #profile-block {
            position: fixed;
            top: 50%; left: 50%;
            /* GSAP drives xPercent/yPercent — don't set transform here */
            width: 820px;
            min-height: 332px;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(1.5px);
            opacity: 0;                    /* GSAP animates to 1 */
            transform-style: preserve-3d;
            transition: transform 0.5s ease-out;
            pointer-events: auto;
        }

        .profile-header {
            display: flex; align-items: flex-start; gap: 15px;
        }

        .profile-container {
            position: relative;
            width: 150px; height: 150px;
        }

        .profile-container::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            background: radial-gradient(
                circle at 10px 10px,
                var(--primary-color, #00CED1) 10%,
                transparent 15%
            );
            animation: orbit 3s linear infinite;
            z-index: -1;
            filter: blur(1px);
        }

        .profile-container.fast-orbit::after {
            animation: fast-orbit 0.5s linear forwards;
        }

        .profile-picture {
            width: 150px; height: 150px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            pointer-events: auto;
            opacity: 1 !important;
        }

        .profile-info {
            flex: 1;
            display: flex; flex-direction: column;
        }

        .name-and-badges {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }

        /* ── Custom font ────────────────────────────────────────────────── */
        @font-face {
            font-family: 'Angel Wish';
            src: url('assets/Angel_wish.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        /* ── Name flicker animation ─────────────────────────────────────── */
        @keyframes name-fuzzy {
            0%,78%,100% {
                filter: drop-shadow(0 0 8px rgba(255,255,255,0.7)) blur(0px);
                letter-spacing: 3px;
            }
            82% {
                filter: drop-shadow(0 0 18px rgba(255,255,255,1)) blur(2.5px);
                letter-spacing: 4.5px;
            }
            86% {
                filter: drop-shadow(0 0 4px rgba(255,255,255,0.35)) blur(0.8px);
                letter-spacing: 2px;
            }
            91% {
                filter: drop-shadow(0 0 22px rgba(255,255,255,0.95)) blur(3px);
                letter-spacing: 5px;
            }
            95% {
                filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)) blur(0.4px);
                letter-spacing: 3px;
            }
        }

        #profile-name {
            font-family: 'Angel Wish', sans-serif;
            font-size: 32px; font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
            opacity: 1 !important;
            animation: name-fuzzy 7s ease-in-out infinite;
        }

        /* ── Badges ─────────────────────────────────────────────────────── */
        .badge-group {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .badge-container {
            position: relative;
            pointer-events: auto;
            opacity: 1 !important;
        }
        .badge-container .tooltip {
            visibility: hidden;
            width: 120px;
            background-color: rgba(0,0,0,0.8);
            color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 0;
            position: absolute; z-index: 100;
            bottom: 125%; left: 50%; margin-left: -60px;
            opacity: 0; transition: opacity 0.3s;
        }
        .badge-container:hover .tooltip { visibility: visible; opacity: 1 !important; }
        .badge-box {
            background: rgba(255,255,255,0.15);
            padding: 2px; border-radius: 15px; display: inline-block;
        }
        .badge-box-inner {
            background: rgba(0,0,0,0.5); padding: 5px; border-radius: 12px;
            display: flex; gap: 8px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
        }
        .badge {
            width: 22px; height: 22px;
            transition: transform 0.3s;
            pointer-events: auto; opacity: 1 !important;
        }
        .badge:hover { transform: scale(1.2); }

        /* ── Bio ────────────────────────────────────────────────────────── */
        #profile-bio {
            color: rgba(255,255,255,0.8);
            font-size: 18px; line-height: 1.5;
            margin-bottom: 6px;
            opacity: 1 !important;
        }

        /* ── Bio extras (tag chips) ──────────────────────────────────────── */
        #bio-extras {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            opacity: 1 !important;
            pointer-events: auto;
        }

        .bio-tag {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 12px;
            color: rgba(255,255,255,0.72);
            cursor: default;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
            user-select: none;
        }
        .bio-tag:hover {
            background: rgba(255,255,255,0.14);
            border-color: var(--primary-color, #00CED1);
            color: #fff;
            transform: translateY(-2px);
        }

        /* ── Separator ──────────────────────────────────────────────────── */
        .bio-separator {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.2);
            margin: 16px 0;
            opacity: 1 !important;
        }

        /* ── Profile footer ─────────────────────────────────────────────── */
        .profile-footer {
            display: flex; flex-direction: column; gap: 5px;
            width: 100%; margin-top: auto;
        }

        /* ── Visitor counter ────────────────────────────────────────────── */
        .visitor-counter {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px; border-radius: 20px;
            font-size: 14px; align-self: flex-start;
            position: relative; pointer-events: auto;
            opacity: 1 !important;
        }
        .visitor-icon {
            width: 18px; height: 18px;
            color: white; opacity: 1 !important;
        }
        .visitor-counter .tooltip {
            visibility: hidden;
            width: 120px; background-color: rgba(0,0,0,0.8);
            color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 0;
            position: absolute; z-index: 100;
            top: -35px; left: 50%; margin-left: -60px;
            opacity: 0; transition: opacity 0.3s;
        }
        .visitor-counter:hover .tooltip { visibility: visible; opacity: 1 !important; }
        #visitor-count { opacity: 1 !important; }

        /* ── Social links ───────────────────────────────────────────────── */
        .social-links {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 0;
    pointer-events: auto;
    opacity: 1 !important;
}

/* ↑ Bumped from 36px → 48px */
.social-icon {
    width: 48px;
    height: 48px;
    object-fit: contain;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.7));
    pointer-events: auto;
    opacity: 1 !important;
}

/* upscale snapchat gif only */
a[href*="snapchat"] .social-icon {
    width: 58px;
    height: 58px;
    margin-top: -5px;
}

.social-icon:hover {
    transform: scale(1.35) rotateY(15deg);
}

        /* ── Discord Presence ───────────────────────────────────────────── */
        #discord-presence {
            display: flex; align-items: center; gap: 8px;
            margin-top: 6px;
        }
        .presence-dot {
            width: 11px; height: 11px;
            border-radius: 50%; flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }
        .presence-dot.online  { background: #23a55a; color: #23a55a; }
        .presence-dot.idle    { background: #f0b232; color: #f0b232; }
        .presence-dot.dnd     { background: #f23f43; color: #f23f43; }
        .presence-dot.offline { background: #80848e; color: #80848e; box-shadow: none; }
        #presence-text {
            font-size: 14px;
            color: rgba(255,255,255,0.75);
            font-style: italic;
        }

        /* ── Theme-specific border colours ──────────────────────────────── */
        .home-theme  #profile-block,
        .home-theme  #skills-block  { border-color: rgba(0,195,255,0.5); }
        .anime-theme #profile-block,
        .anime-theme #skills-block  { border-color: rgba(255,0,255,0.5); }

        /* ── Glitch animation ───────────────────────────────────────────── */
        .glitch { animation: glitchShake 0.2s ease-in-out; }
        @keyframes glitchShake {
            0%   { transform: translate(0); }
            20%  { transform: translate(-2px, 2px); }
            40%  { transform: translate(-2px,-2px); }
            60%  { transform: translate( 2px, 2px); }
            80%  { transform: translate( 2px,-2px); }
            100% { transform: translate(0); }
        }

        /* ── Orbit animations ───────────────────────────────────────────── */
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes fast-orbit {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ── Cursor trail dots ──────────────────────────────────────────── */
        .cursor-trail {
            position: fixed; pointer-events: none; z-index: 9999;
        }
        .cursor-trail-dot {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(
                circle,
                var(--primary-color, #00CED1) 0%,
                var(--secondary-color, #FF6B9E) 100%
            );
            box-shadow: 0 0 4px var(--primary-color, #00CED1);
        }
        /* Comet variant — slightly elongated glow */
        .cursor-trail-comet {
            box-shadow: 0 0 8px 2px var(--primary-color, #00CED1);
        }
        /* Sparkle variant */
        .cursor-trail-sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 13px;
            color: var(--primary-color, #00CED1);
            text-shadow: 0 0 6px var(--primary-color, #00CED1),
                         0 0 12px var(--secondary-color, #FF6B9E);
        }

        /* ── Start screen ───────────────────────────────────────────────── */
        #start-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100vh;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 30; cursor: pointer;
        }
        #start-text {
            font-family: 'Courier New', monospace;
            font-size: 24px; color: #fff; text-align: center;
            white-space: pre-line;
            line-height: 2;
        }
        #start-text .ip-note {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        /* ── Mobile ─────────────────────────────────────────────────────── */
        @media (max-width: 430px) {
            #profile-block, #skills-block {
                width: 90vw; max-width: 350px;
                min-height: 280px; padding: 15px;
                top: 50%; left: 50%;
            }
            .profile-header {
                flex-direction: column; align-items: center; gap: 10px;
            }
            .profile-container { width: 120px; height: 120px; }
            .profile-picture   { width: 120px; height: 120px; }
            .profile-info      { align-items: center; text-align: center; }
            .name-and-badges   { flex-direction: column; align-items: center; gap: 8px; }
            #profile-name      { font-size: 24px; letter-spacing: 2px; }
            .badge-group       { justify-content: center; gap: 6px; }
            .badge             { width: 18px; height: 18px; }
            .badge-container .tooltip { width: 100px; font-size: 12px; margin-left: -50px; bottom: 110%; }
            #profile-bio       { font-size: 14px; line-height: 1.4; }
            #bio-extras        { justify-content: center; }
            .bio-separator     { margin: 15px 0; }
            .social-links      { gap: 10px; justify-content: center; }
            .social-icon       { width: 42px; height: 42px; }  /* ↑ from 32px */
            .visitor-counter   { font-size: 12px; padding: 6px 12px; align-self: center; }
            .visitor-icon      { width: 16px; height: 16px; }
            .visitor-counter .tooltip { width: 100px; font-size: 12px; margin-left: -50px; top: -30px; }
            .skills-title      { font-size: 18px; margin-bottom: 10px; }
            .skill-icon        { width: 18px; height: 18px; }
            .skill-name span   { font-size: 14px; }
            .controls          { bottom: 20px; gap: 8px; padding: 5px 8px; }
            .theme-button      { width: 28px; height: 28px; font-size: 12px; }
            .top-controls      { bottom: 70px; gap: 10px; padding: 6px 10px; }
            .volume-control, .transparency-control { gap: 6px; }
            .volume-icon, .transparency-icon { width: 18px; height: 18px; }
            .slider            { width: 60px; height: 4px; }
            .slider::-webkit-slider-thumb { width: 10px; height: 10px; }
            #results-button-container { top: 10px; }
            #results-theme     { padding: 6px 12px; font-size: 12px; }
            #results-hint      { width: 150px; font-size: 10px; padding: 6px 10px; }
            #start-text        { font-size: 18px; padding: 0 20px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Retro+Gaming&display=swap" rel="stylesheet">
</head>
<body class="home-theme" onload="initMedia()">

    <div class="custom-cursor"></div>

    <div id="start-screen">
        <div id="start-text"></div>
    </div>

    <div class="container">

        <video id="background" autoplay loop muted playsinline webkit-playsinline>
            <source src="assets/background.mp4" type="video/mp4">
        </video>

        <div class="glitch-overlay"></div>
        <div id="hacker-overlay" class="hidden"></div>
        <div id="snow-overlay"   class="hidden"></div>

        <div id="profile-block">
            <div class="profile-header">

                <div class="profile-container">
                    <img src="assets/profile.webp" alt="Profile" class="profile-picture">
                </div>

                <div class="profile-info">
                    <div class="name-and-badges">
                        <div id="profile-name">Xenostopic</div>
                    </div>

                    <div id="discord-presence">
                        <span id="presence-dot" class="presence-dot offline"></span>
                        <span id="presence-text">Fetching status...</span>
                    </div>

                    <div id="profile-bio"></div>

                    <!-- ── Tag chips below bio ─────────────────────────── -->
                    <div id="bio-extras">
                        <span class="bio-tag">🎮 Gaming</span>
                        <span class="bio-tag">👨🏿 Racist</span>
                        <span class="bio-tag">🎲 Gambler</span>
                    </div>
                </div>
            </div>

            <div class="bio-separator"></div>

                <div class="visitor-counter">
                    <svg class="visitor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <span id="visitor-count">...</span>
                    <span class="tooltip">Profile Views</span>
                </div>
            </div>
        </div>

        <!-- ── Theme buttons ──────────────────────────────────────────── -->
        <div class="controls">
            <div id="home-theme"  class="theme-button">1</div>
            <div id="anime-theme" class="theme-button">2</div>
        </div>

        <!-- ── Top controls (volume + transparency + trail) ──────────── -->
        <div class="top-controls">
            <div class="volume-control">
                <svg id="volume-icon" class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                </svg>
                <input id="volume-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.3">
            </div>
            <div class="transparency-control">
                <svg class="transparency-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <input id="transparency-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.15">
            </div>
            <!-- Trail style picker: cycles dots → sparkles → comet → off -->
            <div id="trail-btn" class="trail-button" title="Cursor Trail Style">⬤</div>
        </div>
    </div>

    <audio id="background-music" loop>
        <source src="assets/background_music.mp3" type="audio/mp3">
    </audio>
    <audio id="anime-music" loop muted>
        <source src="assets/anime_music.mp3" type="audio/mp3">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
